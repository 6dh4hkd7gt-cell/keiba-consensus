<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>サイト別評価 | AI競馬コンセンサス</title>
    <link rel="stylesheet" href="./phone.css?v=weekly-weights-1" />
  </head>
  <body>
    <main class="weights-page sites-page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Source Detail</p>
          <h2>サイト別評価</h2>
        </div>
        <div class="topbar-actions">
          <a class="text-button nav-link" href="./weekly.html">成績</a>
          <a id="siteBackLink" class="text-button nav-link" href="./phone.html">戻る</a>
        </div>
      </header>

      <section class="weights-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">10 Sources</p>
            <h3>各サイトの評価</h3>
          </div>
        </div>
        <div class="site-selector-grid">
          <label>
            <span>レース</span>
            <select id="siteRaceSelect" aria-label="レース"></select>
          </label>
          <label>
            <span>馬</span>
            <select id="siteHorseSelect" aria-label="馬"></select>
          </label>
        </div>
        <div id="siteDetailMeta" class="site-detail-meta"></div>
        <div id="siteDetailList" class="site-votes site-detail-list"></div>
      </section>
    </main>

    <script src="./auto-weights.js"></script>
    <script src="./app-live.js?v=real-data-1"></script>
  </body>
</html>
