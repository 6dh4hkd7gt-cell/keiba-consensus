name: Update local racing schedule

on:
  schedule:
    - cron: "15 21 * * *"
    - cron: "*/5 1-11 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-local-races:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch today's local racing schedule
        run: node scripts/update-local-races.js

      - name: Commit schedule update
        run: |
          if git diff --quiet -- docs/chihou/data/today-races.json; then
            echo "No schedule changes."
            exit 0
          fi

          cp docs/chihou/data/today-races.json /tmp/today-races.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/today-races.json docs/chihou/data/today-races.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/chihou/data/today-races.json
          git commit -m "Update local racing schedule"
          git push origin HEAD:main
